<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LinkTerm">
    <link rel="manifest" href="/manifest.json">
    <title>LinkTerm</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="terminal-page">
    <div id="statusBar" class="status-bar status-connecting">
        <span id="statusIcon">●</span>
        <span id="statusText">连接中...</span>
        <button id="menuBtn" class="menu-btn">≡</button>
    </div>

    <div id="terminalContainer">
        <div id="reconnectOverlay" class="reconnect-bar hidden">
            <div class="reconnect-bar-content">
                <div class="reconnect-bar-text">
                    <span id="reconnectMsg" class="reconnect-msg">重连中...</span>
                    <span id="reconnectReason" class="reconnect-reason"></span>
                </div>
                <div id="reconnectActions" class="reconnect-actions hidden">
                    <button id="retryBtn" class="reconnect-btn">重新连接</button>
                    <button id="reloginBtn" class="reconnect-btn btn-secondary">换 Token</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toolbar" class="toolbar">
        <div class="toolbar-row">
            <button data-key="Escape" class="key-btn">Esc</button>
            <button data-key="Tab" class="key-btn">Tab</button>
            <button data-key="Ctrl" class="key-btn mod-key">Ctrl</button>
            <button data-key="ArrowUp" class="key-btn">↑</button>
            <button data-key="ArrowDown" class="key-btn">↓</button>
            <button data-key="ArrowLeft" class="key-btn">←</button>
            <button data-key="ArrowRight" class="key-btn">→</button>
        </div>
        <div class="toolbar-row">
            <button data-key="|" class="key-btn">|</button>
            <button data-key="~" class="key-btn">~</button>
            <button data-key="/" class="key-btn">/</button>
            <button data-key="-" class="key-btn">-</button>
            <button data-key="_" class="key-btn">_</button>
            <button data-key="$" class="key-btn">$</button>
            <button id="pasteBtn" class="key-btn tool-btn">粘贴</button>
            <button data-fontsize="small" class="key-btn tool-btn font-btn">小</button>
            <button data-fontsize="medium" class="key-btn tool-btn font-btn">中</button>
            <button data-fontsize="large" class="key-btn tool-btn font-btn">大</button>
        </div>
    </div>

    <div id="menuOverlay" class="menu-overlay hidden">
        <div class="menu-panel">
            <div class="menu-section-title">会话列表</div>
            <div id="sessionList" class="session-list"></div>
            <div class="menu-divider"></div>
            <button id="newTermBtn" class="menu-item">新建终端</button>
            <button id="closeTermBtn" class="menu-item danger">关闭终端</button>
            <div class="menu-divider"></div>
            <div class="menu-section-title">主题</div>
            <div class="theme-row">
                <button id="themeDark" class="theme-btn active" data-theme="dark">暗色</button>
                <button id="themeLight" class="theme-btn" data-theme="light">亮色</button>
                <button id="themeDracula" class="theme-btn" data-theme="dracula">Dracula</button>
            </div>
            <div class="menu-divider"></div>
            <button id="logoutBtn" class="menu-item">退出登录</button>
            <button id="closeMenuBtn" class="menu-item">取消</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
    <script src="/js/terminal.js"></script>
    <script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js');}</script>
</body>
</html>
